<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Leave Intake Wizard React</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
      // Handle SPA redirect from 404.html (preserve hash for Figma capture)
      (function() {
        var redirect = new URLSearchParams(window.location.search).get('p');
        if (redirect) {
          window.history.replaceState(null, '', redirect + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
